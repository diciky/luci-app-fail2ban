name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup OpenWrt Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache flex gawk gettext git \
            libncurses5-dev libncursesw5-dev libssl-dev \
            python3 python3-yaml rsync subversion unzip wget which zlib1g-dev

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git openwrt_build
          cd openwrt_build
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Package
        run: |
          cd openwrt_build
          mkdir -p package/luci-app-fail2ban
          cp -r ${{ github.workspace }}/fail2ban-luci/root/* package/luci-app-fail2ban/
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd openwrt_build
          cat > .config << 'EOF'
          CONFIG_HAVE_DOT_CONFIG=y
          CONFIG_HAVE_CCACHE=y
          CONFIG_CCACHE=y
          CONFIG_CCACHE_DIR="/tmp/.ccache"
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-app-fail2ban=y
          EOF
          make defconfig

      - name: Build Package
        run: |
          cd openwrt_build
          make package/luci-app-fail2ban/compile -j$(nproc) V=s

      - name: Collect Artifact
        run: |
          cd openwrt_build
          mkdir -p ${{ github.workspace }}/artifacts
          find . -name "luci-app-fail2ban_*.ipk" -type f -exec cp {} ${{ github.workspace }}/artifacts/ \;

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fail2ban-ipk
          path: artifacts/*.ipk
          retention-days: 7

  build-all-targets:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        target: [armvirt, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache flex gawk gettext git \
            libncurses5-dev libncursesw5-dev libssl-dev \
            python3 python3-yaml rsync subversion unzip wget which zlib1g-dev

      - name: Clone OpenWrt (${{ matrix.target }})
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git openwrt_${{ matrix.target }}
          cd openwrt_${{ matrix.target }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Package
        run: |
          cd openwrt_${{ matrix.target }}
          mkdir -p package/luci-app-fail2ban
          cp -r ${{ github.workspace }}/fail2ban-luci/root/* package/luci-app-fail2ban/
          ./scripts/feeds install -a

      - name: Configure for ${{ matrix.target }}
        run: |
          cd openwrt_${{ matrix.target }}
          if [ "${{ matrix.target }}" = "armvirt" ]; then
            echo 'CONFIG_TARGET_armvirt=y' >> .config
          elif [ "${{ matrix.target }}" = "x86_64" ]; then
            echo 'CONFIG_TARGET_x86_64=y' >> .config
          fi
          echo 'CONFIG_HAVE_DOT_CONFIG=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-fail2ban=y' >> .config
          make defconfig

      - name: Build for ${{ matrix.target }}
        run: |
          cd openwrt_${{ matrix.target }}
          make -j$(nproc) 2>&1 | tail -30

      - name: Collect Artifacts
        if: success()
        run: |
          cd openwrt_${{ matrix.target }}
          mkdir -p ${{ github.workspace }}/artifacts/${{ matrix.target }}
          find . -name "luci-app-fail2ban_*.ipk" -type f -exec cp {} ${{ github.workspace }}/artifacts/${{ matrix.target }}/ \;

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fail2ban-${{ matrix.target }}
          path: artifacts/${{ matrix.target }}/*.ipk
          retention-days: 7
